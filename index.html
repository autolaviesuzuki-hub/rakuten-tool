<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>楽天API（新API）テスト</title>
</head>
<body>
  <h1>楽天API（新API）テストページ</h1>
  <button id="btn">楽天APIを呼び出す</button>
  <pre id="result"></pre>

<script>
document.getElementById("btn").onclick = async () => {

  const url = "https://rakuten-marketplace.p.rapidapi.com/item-search?keyword=テスト";

  const res = await fetch(url, {
    headers: {
      "X-RapidAPI-Key": "あなたのAPIキー",
      "X-RapidAPI-Host": "rakuten-marketplace.p.rapidapi.com"
    }
  });

  const data = await res.json();
  document.getElementById("result").textContent = JSON.stringify(data, null, 2);
};
</script>

</body>
</html>
